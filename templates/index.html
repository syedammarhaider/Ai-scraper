<!-- 
AI SCRAPER ULTIMATE - 100% WORKING
Ultra Fast | Zero Errors | Production Ready
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SCRAPER ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --text: #1a1a2e;
            --border: #e2e8f0;
            --gold: #d4af37;
            --pink: #c85cb8;
            --gradient: linear-gradient(135deg, #d4af37, #c85cb8);
        }

        [data-theme="dark"] {
            --bg: #0f0c29;
            --card: #1a1a2e;
            --text: #ffffff;
            --border: #2d2d4a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 20px;
            transition: all 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 16px 28px;
            border-radius: 40px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            background: var(--gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Cards */
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 32px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 i {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Inputs */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .input-group input,
        .input-group select {
            flex: 1;
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        /* Buttons */
        .crawl-btn, .primary-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            background: var(--gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            width: 100%;
            justify-content: center;
            font-size: 16px;
        }

        .crawl-btn:hover, .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        }

        /* Options */
        .crawl-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .option-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-item label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            opacity: 0.7;
        }

        .option-item input {
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        /* Progress */
        .progress-container {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg);
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 40px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Products Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .product-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            border-color: #d4af37;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-price {
            color: #d4af37;
            font-weight: 700;
            font-size: 18px;
        }

        /* Export Grid */
        .export-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .export-btn {
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: var(--gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Toggle */
        .toggle-container {
            display: flex;
            gap: 10px;
            background: var(--bg);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: transparent;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--gradient);
            color: white;
        }

        /* Chat */
        .chat-container {
            background: var(--bg);
            padding: 20px;
            border-radius: 24px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 12px;
        }

        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 80%;
        }

        .user .message-content {
            background: var(--gradient);
            color: white;
            margin-left: auto;
        }

        .assistant .message-content {
            background: var(--bg);
            border: 1px solid var(--border);
        }

        /* Stats */
        .stats-badges {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: var(--gradient);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        /* Preview */
        .preview-content {
            background: var(--bg);
            padding: 20px;
            border-radius: 20px;
            max-height: 400px;
            overflow: auto;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 12px;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: 600;
            animation: slideIn 0.3s;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(145deg, #0f0c29, #1a1033);
            color: white;
            border-radius: 40px 40px 0 0;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .export-grid { grid-template-columns: repeat(3, 1fr); }
            .crawl-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-bolt"></i> AI SCRAPER ULTIMATE</h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
            </button>
        </div>

        <!-- Crawler Card -->
        <div class="card">
            <h2><i class="fas fa-sitemap"></i> Full Website Crawler</h2>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Enter website URL (e.g., example.com)" value="https://books.toscrape.com">
                <button class="primary-btn" onclick="previewUrl()"><i class="fas fa-eye"></i> Preview</button>
            </div>
            
            <div class="crawl-options">
                <div class="option-item">
                    <label><i class="fas fa-maximize"></i> Max Pages</label>
                    <input type="number" id="maxPages" value="30" min="5" max="100">
                </div>
                <div class="option-item">
                    <label><i class="fas fa-clock"></i> Delay (sec)</label>
                    <input type="number" id="delay" value="0.2" min="0.1" max="2" step="0.1">
                </div>
            </div>
            
            <button class="crawl-btn" onclick="crawlWebsite()">
                <i class="fas fa-rocket"></i> START CRAWLING - FAST MODE
            </button>
            
            <div id="progressContainer" class="progress-container" style="display:none">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="progress-stats">
                    <span id="progressPages">0 pages</span>
                    <span id="progressProducts">0 products</span>
                    <span id="progressStatus">Starting...</span>
                </div>
            </div>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Crawling... Please wait</p>
            </div>
        </div>

        <!-- Results Card -->
        <div class="card" id="dataCard" style="display:none">
            <h2>
                <i class="fas fa-database"></i> 
                Crawl Results
                <span id="productCount" class="stat-badge" style="padding:5px 15px">0 products</span>
            </h2>
            
            <div id="statsBadges" class="stats-badges"></div>
            
            <div class="toggle-container">
                <button class="toggle-btn active" onclick="showTab('products')">
                    <i class="fas fa-box"></i> Products
                </button>
                <button class="toggle-btn" onclick="showTab('json')">
                    <i class="fas fa-code"></i> JSON
                </button>
                <button class="toggle-btn" onclick="showTab('stats')">
                    <i class="fas fa-chart-bar"></i> Stats
                </button>
            </div>
            
            <div id="productsGrid" class="product-grid"></div>
            <div id="previewContent" class="preview-content" style="display:none"></div>
            
            <div class="export-grid">
                <button class="export-btn" onclick="exportData('json')">JSON</button>
                <button class="export-btn" onclick="exportData('csv')">CSV</button>
                <button class="export-btn" onclick="exportData('excel')">Excel</button>
                <button class="export-btn" onclick="exportData('txt')">Text</button>
                <button class="export-btn" onclick="exportData('pdf')">PDF</button>
                <button class="export-btn" onclick="exportData('markdown')">MD</button>
            </div>
        </div>

        <!-- AI Chat Card -->
        <div class="card" id="chatCard" style="display:none">
            <h2><i class="fas fa-robot"></i> AI Assistant</h2>
            
            <div class="toggle-container">
                <button class="toggle-btn active" onclick="switchMode('groq')">
                    <i class="fas fa-brain"></i> Data Only
                </button>
                <button class="toggle-btn" onclick="switchMode('grok')">
                    <i class="fas fa-bolt"></i> Universal
                </button>
            </div>
            
            <div id="groqSection">
                <div id="chatContainer" class="chat-container"></div>
                <div class="input-group">
                    <input type="text" id="questionInput" placeholder="Ask about products...">
                    <button class="primary-btn" onclick="askGroq()"><i class="fas fa-paper-plane"></i></button>
                    <button class="primary-btn" onclick="clearChat()" style="background:#ef4444"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            
            <div id="grokSection" style="display:none">
                <div id="grokChatContainer" class="chat-container"></div>
                <div class="input-group">
                    <input type="text" id="grokInput" placeholder="Ask anything...">
                    <button class="primary-btn" onclick="askGrok()"><i class="fas fa-bolt"></i></button>
                    <button class="primary-btn" onclick="clearGrok()" style="background:#ef4444"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p><i class="fas fa-crown" style="color:#d4af37"></i> AI SCRAPER ULTIMATE · 100% WORKING · FAST MODE</p>
            <p style="opacity:0.7; font-size:12px; margin-top:10px">© 2025 AMMAR HAIDER</p>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let scrapedData = null;
        let groqHistory = [];
        let grokHistory = [];

        // ========== THEME ==========
        function toggleTheme() {
            const body = document.body;
            const text = document.getElementById('themeText');
            const icon = document.querySelector('.theme-toggle i');
            
            if(body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                text.textContent = 'Light';
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'light');
                text.textContent = 'Dark';
                icon.className = 'fas fa-moon';
            }
        }

        // ========== NOTIFICATION ==========
        function notify(msg, type = 'success') {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.background = type === 'success' ? '#10b981' : '#ef4444';
            div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        // ========== PREVIEW ==========
        function previewUrl() {
            const url = document.getElementById('urlInput').value;
            if(!url) return notify('Enter URL', 'warning');
            window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
        }

        // ========== CRAWL WEBSITE ==========
        async function crawlWebsite() {
            const url = document.getElementById('urlInput').value;
            const maxPages = document.getElementById('maxPages').value;
            const delay = document.getElementById('delay').value;
            
            if(!url) return notify('Enter URL', 'warning');
            
            // Show UI
            document.getElementById('loading').style.display = 'block';
            document.getElementById('progressContainer').style.display = 'block';
            document.querySelector('.crawl-btn').disabled = true;
            
            const formData = new FormData();
            formData.append('url', url);
            formData.append('max_pages', maxPages);
            formData.append('delay', delay);
            
            try {
                const res = await fetch('/crawl', { method: 'POST', body: formData });
                const result = await res.json();
                
                if(result.success) {
                    scrapedData = result.data;
                    
                    // Update UI
                    document.getElementById('dataCard').style.display = 'block';
                    document.getElementById('chatCard').style.display = 'block';
                    
                    displayResults(scrapedData);
                    notify(`Found ${scrapedData.product_count} products!`);
                    
                    // Add welcome messages
                    addMessage('assistant', '✅ Crawl complete! Ask me about the products.');
                    addGrokMessage('assistant', '🚀 Ask me anything!');
                    
                    // Update progress
                    updateProgress(scrapedData.crawl_stats.pages_crawled, scrapedData.product_count, 'Complete!');
                } else {
                    notify('Error: ' + (result.error || 'Unknown'), 'error');
                }
            } catch(e) {
                notify('Error: ' + e.message, 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.crawl-btn').disabled = false;
            }
        }

        // ========== UPDATE PROGRESS ==========
        function updateProgress(pages, products, status) {
            document.getElementById('progressPages').textContent = pages + ' pages';
            document.getElementById('progressProducts').textContent = products + ' products';
            document.getElementById('progressStatus').textContent = status;
            document.getElementById('progressFill').style.width = '100%';
        }

        // ========== DISPLAY RESULTS ==========
        function displayResults(data) {
            document.getElementById('productCount').textContent = data.product_count + ' products';
            
            // Stats badges
            const stats = data.crawl_stats;
            document.getElementById('statsBadges').innerHTML = `
                <div class="stat-badge"><i class="fas fa-file-alt"></i> ${stats.pages_crawled} Pages</div>
                <div class="stat-badge"><i class="fas fa-box"></i> ${data.product_count} Products</div>
            `;
            
            // Products grid
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            if(data.products && data.products.length) {
                data.products.slice(0, 12).forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-name">${p.name || 'Unnamed'}</div>
                            <div class="product-price">${p.price || 'Price N/A'}</div>
                            ${p.url ? `<small><a href="${p.url}" target="_blank">View</a></small>` : ''}
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = '<p style="text-align:center; padding:40px;">No products found</p>';
            }
            
            showTab('products');
        }

        // ========== SHOW TAB ==========
        function showTab(tab) {
            const btns = document.querySelectorAll('.toggle-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const grid = document.getElementById('productsGrid');
            const preview = document.getElementById('previewContent');
            
            if(tab === 'products') {
                grid.style.display = 'grid';
                preview.style.display = 'none';
            } else {
                grid.style.display = 'none';
                preview.style.display = 'block';
                
                if(tab === 'json') {
                    preview.innerHTML = '<pre>' + JSON.stringify(scrapedData, null, 2) + '</pre>';
                } else {
                    const stats = scrapedData.crawl_stats;
                    preview.innerHTML = `
                        <h3>Crawl Statistics</h3>
                        <p>Pages: ${stats.pages_crawled}</p>
                        <p>Products: ${scrapedData.product_count}</p>
                        <p>Start: ${new Date(stats.start_time).toLocaleString()}</p>
                        <p>End: ${new Date(stats.end_time).toLocaleString()}</p>
                    `;
                }
            }
        }

        // ========== GROQ CHAT ==========
        async function askGroq() {
            const q = document.getElementById('questionInput').value;
            if(!q) return notify('Enter question', 'warning');
            if(!scrapedData) return addMessage('assistant', '⚠️ Crawl a website first!');
            
            addMessage('user', q);
            document.getElementById('questionInput').value = '';
            
            const typingId = addTyping('chatContainer');
            
            const formData = new FormData();
            formData.append('message', q);
            formData.append('scraped_data', JSON.stringify(scrapedData));
            
            try {
                const res = await fetch('/groq-chat', { method: 'POST', body: formData });
                const result = await res.json();
                
                document.getElementById(typingId)?.remove();
                
                if(result.success) {
                    addMessage('assistant', result.response);
                } else {
                    addMessage('assistant', '❌ Error: ' + (result.error || 'Unknown'));
                }
            } catch(e) {
                document.getElementById(typingId)?.remove();
                addMessage('assistant', '❌ Error: ' + e.message);
            }
        }

        // ========== GROK CHAT ==========
        async function askGrok() {
            const q = document.getElementById('grokInput').value;
            if(!q) return notify('Enter question', 'warning');
            
            addGrokMessage('user', q);
            document.getElementById('grokInput').value = '';
            
            const typingId = addTyping('grokChatContainer');
            
            const formData = new FormData();
            formData.append('message', q);
            
            try {
                const res = await fetch('/grok-mode', { method: 'POST', body: formData });
                const result = await res.json();
                
                document.getElementById(typingId)?.remove();
                
                if(result.success) {
                    addGrokMessage('assistant', result.response);
                } else {
                    addGrokMessage('assistant', '❌ Error: ' + (result.error || 'Unknown'));
                }
            } catch(e) {
                document.getElementById(typingId)?.remove();
                addGrokMessage('assistant', '❌ Error: ' + e.message);
            }
        }

        // ========== HELPERS ==========
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = '<div class="message-content">' + content + '</div>';
            document.getElementById('chatContainer').appendChild(div);
            document.getElementById('chatContainer').scrollTop = 999999;
        }

        function addGrokMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = '<div class="message-content">' + content + '</div>';
            document.getElementById('grokChatContainer').appendChild(div);
            document.getElementById('grokChatContainer').scrollTop = 999999;
        }

        function addTyping(containerId) {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = id;
            div.innerHTML = '<div class="message-content typing"><span></span><span></span><span></span> Thinking...</div>';
            document.getElementById(containerId).appendChild(div);
            return id;
        }

        function clearChat() {
            document.getElementById('chatContainer').innerHTML = '';
            addMessage('assistant', '🧹 Chat cleared');
        }

        function clearGrok() {
            document.getElementById('grokChatContainer').innerHTML = '';
            addGrokMessage('assistant', '🧹 Chat cleared');
        }

        function switchMode(mode) {
            const groq = document.getElementById('groqSection');
            const grok = document.getElementById('grokSection');
            const btns = document.querySelectorAll('.toggle-btn');
            
            if(mode === 'groq') {
                groq.style.display = 'block';
                grok.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                groq.style.display = 'none';
                grok.style.display = 'block';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }

        // ========== EXPORT ==========
        async function exportData(format) {
            if(!scrapedData) return notify('No data to export', 'warning');
            
            try {
                const res = await fetch('/export', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({format, data: scrapedData})
                });
                
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `export.${format}`;
                a.click();
                
                notify(`Exported as ${format.toUpperCase()}`);
            } catch(e) {
                notify('Export failed: ' + e.message, 'error');
            }
        }

        // ========== INIT ==========
        window.onload = function() {
            addMessage('assistant', '👋 Enter URL and click START CRAWLING');
            addGrokMessage('assistant', '🚀 Ready to answer anything!');
            
            // Test URL
            document.getElementById('urlInput').value = 'https://books.toscrape.com';
        }
    </script>
</body>
</html>
