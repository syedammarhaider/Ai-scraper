<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>AI SCRAPER · AMMAR EDITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="/static/styles.css">
</head>

<body data-theme="light">

<div class="container">

<div class="header">
    <h1><i class="fas fa-bolt"></i> AI SCRAPER </h1>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
    </button>
</div>

<!-- SCRAPER SECTION -->
<div class="card">
    <h2><i class="fas fa-globe"></i> Website Scraper</h2>
    <div class="input-group">
        <input type="url" id="urlInput" placeholder="URL (e.g., example.com)" value="">
        <button class="primary-btn" onclick="previewUrl()"><i class="fas fa-eye"></i> Preview</button>
    </div>
    <div class="input-group">
        <select id="scrapeMode">
            <option value="comprehensive">🔍 Comprehensive</option>
            <option value="smart">⚡ Smart</option>
            <option value="basic">📄 Basic</option>
        </select>
        <select id="jsMode">
            <option value="false">🚫 JS Off</option>
            <option value="true">⚡ JS On</option>
        </select>
    </div>
    <button class="scrape-btn" onclick="scrapeWebsite()">
        <i class="fas fa-search"></i> SCRAPE NOW
    </button>
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>Processing...</p>
    </div>
</div>

<!-- SCRAPED DATA CARD -->
<div class="card" id="dataCard" style="display:none">
    <h2><i class="fas fa-database"></i> Scraped Data <span class="model-badge">Preview</span></h2>
    <div id="previewContent" class="preview-content"></div>
    <div class="export-grid">
        <button class="export-btn" onclick="exportData('json')"><i class="fas fa-code"></i> JSON</button>
        <button class="export-btn" onclick="exportData('csv')"><i class="fas fa-table"></i> CSV</button>
        <button class="export-btn" onclick="exportData('excel')"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="export-btn" onclick="exportData('txt')"><i class="fas fa-file-alt"></i> Text</button>
        <button class="export-btn" onclick="exportData('pdf')"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="export-btn" onclick="exportData('markdown')"><i class="fas fa-markdown"></i> MD</button>
    </div>
</div>

<!-- COMBINED AI CHAT CARD -->
<div class="card" id="combinedChatCard" style="display:none">
    <h2><i class="fas fa-robot"></i> AI Assistants <span class="model-badge">Dual Mode</span></h2>
    
    <div class="toggle-container">
        <button class="toggle-btn active" id="groqToggle" onclick="switchMode('groq')">
            <i class="fas fa-brain"></i> 
            <span> AI · Scraped</span>
        </button>
        <button class="toggle-btn" id="grokToggle" onclick="switchMode('grok')">
            <i class="fas fa-bolt"></i> 
            <span>Mode · Universal</span>
        </button>
    </div>

    <div id="groqSection" class="chat-section active">
        <div class="mode-header">
            <h2><i class="fas fa-microchip"></i> AI · Scraped Data Analysis</h2>
        </div>
        <div id="chatContainer" class="chat-container"></div>
        <div class="input-group">
            <input type="text" id="questionInput" placeholder="Ask about scraped data..." onkeypress="if(event.key==='Enter') askGroq()">
            <button class="primary-btn" onclick="askGroq()"><i class="fas fa-paper-plane"></i></button>
            <button class="primary-btn" onclick="clearGroqChat()" style="background: linear-gradient(135deg, #ef4444, #dc2626);"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div id="grokSection" class="chat-section">
        <div class="mode-header">
            <h2><i class="fas fa-brain"></i> AI · Universal</h2>
            <p>Ask any question (not limited to scraped data)</p>
        </div>
        <div id="grokChatContainer" class="chat-container"></div>
        <div class="input-group">
            <input type="text" id="grokQuestionInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') askGrokMode()">
            <button class="primary-btn" onclick="askGrokMode()"><i class="fas fa-bolt"></i></button>
            <button class="primary-btn" onclick="clearGrokChat()" style="background: linear-gradient(135deg, #ef4444, #dc2626);"><i class="fas fa-trash"></i></button>
        </div>
    </div>
</div>

<!-- FOOTER (same as before) -->
<footer class="footer">
    <!-- ... your footer content remains exactly the same ... -->
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// Global variables
let scrapedData = null;
let sessionId = null;
let groqChatHistory = [];
let grokChatHistory = [];

// Theme toggle
function toggleTheme() {
    const body = document.body;
    const themeText = document.getElementById('themeText');
    const icon = document.querySelector('.theme-toggle i');
    if (body.getAttribute('data-theme') === 'light') {
        body.setAttribute('data-theme', 'dark');
        themeText.textContent = 'Light';
        icon.className = 'fas fa-sun';
    } else {
        body.setAttribute('data-theme', 'light');
        themeText.textContent = 'Dark';
        icon.className = 'fas fa-moon';
    }
}

// URL preview
function previewUrl() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return showNotification("URL daalain", "warning");
    const fullUrl = url.startsWith('http') ? url : 'https://' + url;
    window.open(fullUrl, '_blank');
}

// Notification
function showNotification(message, type = "success") {
    const n = document.createElement('div');
    n.className = 'export-notification';
    n.style.background = type === 'success' ? 'var(--success)' :
                         type === 'warning' ? 'var(--warning)' : 'var(--danger)';
    n.innerHTML = `<i class="fas fa-${
        type === 'success' ? 'check-circle' : 
        type === 'warning' ? 'exclamation-circle' : 'times-circle'
    }"></i> ${message}`;
    document.body.appendChild(n);
    setTimeout(() => {
        n.style.animation = 'slideOutRight 0.3s ease-out';
        setTimeout(() => n.remove(), 300);
    }, 2500);
}

// Main scraping function (full data, no limit here)
async function scrapeWebsite() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return showNotification("URL daalain", "warning");

    const fullUrl = url.startsWith('http') ? url : 'https://' + url;

    document.getElementById('loading').style.display = 'block';
    document.querySelector('.scrape-btn').disabled = true;

    try {
        const fd = new FormData();
        fd.append('url', fullUrl);
        fd.append('mode', document.getElementById('scrapeMode').value);
        fd.append('js', document.getElementById('jsMode').value);

        const res = await fetch('/scrape', { method: 'POST', body: fd });

        if (!res.ok) {
            const err = await res.text();
            throw new Error(`Server error ${res.status}: ${err.slice(0,100)}`);
        }

        const data = await res.json();

        if (data.success) {
            scrapedData = data.data;
            sessionId = data.session_id;

            document.getElementById('previewContent').innerHTML = 
                '<pre>' + JSON.stringify(data.data, null, 2) + '</pre>';

            document.getElementById('dataCard').style.display = 'block';
            document.getElementById('combinedChatCard').style.display = 'block';

            addMessage('assistant', '✅ Full scrape ho gaya! Ab sawal pooch sakte ho.');
            showNotification('Scraping successful!', 'success');
        } else {
            showNotification('Error: ' + (data.error || 'Unknown'), 'error');
        }
    } catch (err) {
        showNotification('Scraping fail: ' + err.message, 'error');
        console.error(err);
    } finally {
        document.getElementById('loading').style.display = 'none';
        document.querySelector('.scrape-btn').disabled = false;
    }
}

// Groq chat (scraped data mode) - send limited data
async function askGroq() {
    const q = document.getElementById('questionInput').value.trim();
    if (!q) return showNotification("Sawal likhein", "warning");
    if (!scrapedData) return addMessage('assistant', '⚠️ Pehle scrape karein!');

    addMessage('user', q);
    document.getElementById('questionInput').value = '';

    const tid = 't-' + Date.now();
    const td = document.createElement('div');
    td.className = 'message assistant';
    td.id = tid;
    td.innerHTML = '<div class="message-content typing">Jawab tayyar ho raha...</div>';
    document.getElementById('chatContainer').appendChild(td);

    try {
        const fd = new FormData();
        fd.append('message', q);

        // Limit data sent to AI (prevents 413 error)
        const limited = {
            title: scrapedData.title || "",
            url: scrapedData.url || "",
            description: scrapedData.description || "",
            paragraphs: (scrapedData.paragraphs || []).slice(0, 80),
            headings: scrapedData.headings || {},
            structured_data: scrapedData.structured_data || {}
        };
        fd.append('scraped_data', JSON.stringify(limited));
        fd.append('history', JSON.stringify(groqChatHistory));

        const res = await fetch('/groq-chat', { method: 'POST', body: fd });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || `Error ${res.status}`);
        }

        const result = await res.json();

        document.getElementById(tid)?.remove();

        if (result.success) {
            addMessage('assistant', marked.parse(result.response));
            groqChatHistory.push({ role: 'user', content: q });
            groqChatHistory.push({ role: 'assistant', content: result.response });
        } else {
            addMessage('assistant', '❌ ' + result.error);
        }
    } catch (e) {
        document.getElementById(tid)?.remove();
        addMessage('assistant', '❌ ' + e.message);
    }
}

// Grok Mode (universal) - no real scraped data needed
async function askGrokMode() {
    const q = document.getElementById('grokQuestionInput').value.trim();
    if (!q) return showNotification("Sawal likhein", "warning");

    addGrokMessage('user', q);
    document.getElementById('grokQuestionInput').value = '';

    const tid = 'gt-' + Date.now();
    const td = document.createElement('div');
    td.className = 'message assistant';
    td.id = tid;
    td.innerHTML = '<div class="message-content typing">Soch raha hoon...</div>';
    document.getElementById('grokChatContainer').appendChild(td);

    try {
        const fd = new FormData();
        fd.append('message', q);
        fd.append('scraped_data', JSON.stringify({})); // dummy
        fd.append('analysis_type', 'comprehensive');
        fd.append('history', JSON.stringify(grokChatHistory));

        const res = await fetch('/grok-mode', { method: 'POST', body: fd });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || `Error ${res.status}`);
        }

        const result = await res.json();

        document.getElementById(tid)?.remove();

        if (result.success) {
            addGrokMessage('assistant', marked.parse(result.response));
            grokChatHistory.push({ role: 'user', content: q });
            grokChatHistory.push({ role: 'assistant', content: result.response });
        } else {
            addGrokMessage('assistant', '❌ ' + result.error);
        }
    } catch (e) {
        document.getElementById(tid)?.remove();
        addGrokMessage('assistant', '❌ ' + e.message);
    }
}

// Add message helpers (same as before)
function addMessage(role, content) {
    const c = document.getElementById('chatContainer');
    const d = document.createElement('div');
    d.className = `message ${role}`;
    d.innerHTML = `<div class="message-content">${content}</div>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

function addGrokMessage(role, content) {
    const c = document.getElementById('grokChatContainer');
    const d = document.createElement('div');
    d.className = `message ${role}`;
    d.innerHTML = `<div class="message-content">${content}</div>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

// Clear chats
function clearGroqChat() {
    document.getElementById('chatContainer').innerHTML = '';
    groqChatHistory = [];
    addMessage('assistant', '🧹 Chat clear ho gaya.');
}

function clearGrokChat() {
    document.getElementById('grokChatContainer').innerHTML = '';
    grokChatHistory = [];
    addGrokMessage('assistant', '🧹 Grok chat clear ho gaya.');
}

// Export remains unchanged (your original exportData function)
async function exportData(format) {
    // ... your original exportData code here - no changes needed ...
    // (paste your original exportData function body here)
}

// Mode switch
function switchMode(mode) {
    // ... your original switchMode code - no changes ...
}

// Onload
window.onload = function() {
    document.body.setAttribute('data-theme', 'light');
    setTimeout(() => {
        if (document.getElementById('combinedChatCard').style.display !== 'block') {
            addMessage('assistant', '👋 URL daal kar SCRAPE NOW dabayein.');
            addGrokMessage('assistant', '🚀 Grok Mode tayyar hai! Kuch bhi pooch lo.');
        }
    }, 300);
}
</script>

</body>
</html>
